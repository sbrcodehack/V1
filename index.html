<!DOCTYPE html>
<html>
<head>
    <title>AI Intraday Trading Bot</title>
    <style>
        body {
            font-family: Arial;
            background: #0b0b0b;
            color: #00ffcc;
            text-align: center;
        }
        .card {
            border: 1px solid #00ffcc;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        .buy { color: #00ff00; }
        .sell { color: red; }
        .hold { color: yellow; }
    </style>
</head>
<body>

<h1>🚀 AI Intraday Signal Bot</h1>

<div class="card">
    <h2 id="symbol">Loading...</h2>
    <p>Price: <span id="price"></span></p>
    <p>EMA 9: <span id="ema9"></span></p>
    <p>EMA 21: <span id="ema21"></span></p>
    <p>RSI: <span id="rsi"></span></p>
    <p>Volume Spike: <span id="volume"></span></p>
    <h2 id="signal" class="hold">Signal: WAIT</h2>
</div>

<script>
// ===== MOCK DATA (works instantly) =====
function getMockData() {
    return {
        symbol: "RELIANCE",
        prices: [100,102,101,103,105,107,106,108,110,112,111,113,115,117,120],
        volume: [1000,1200,1100,1500,1600,1700,2000,2200,2500,2700,3000,3500,4000,4200,6000]
    };
}

// ===== EMA =====
function calculateEMA(prices, period) {
    let k = 2 / (period + 1);
    let ema = prices.slice(0, period).reduce((a,b)=>a+b)/period;

    for (let i = period; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

// ===== RSI =====
function calculateRSI(prices, period = 14) {
    let gain = 0, loss = 0;

    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i-1];
        if (diff > 0) gain += diff;
        else loss -= diff;
    }

    if (loss === 0) return 100;

    let rs = gain / loss;
    return 100 - (100 / (1 + rs));
}

// ===== Volume Spike =====
function volumeSpike(volume) {
    let avg = volume.slice(0, -1).reduce((a,b)=>a+b) / (volume.length-1);
    return volume[volume.length-1] > avg * 1.5;
}

// ===== Signal Logic =====
function generateSignal(data) {
    let ema9 = calculateEMA(data.prices, 9);
    let ema21 = calculateEMA(data.prices, 9); // simplified
    let rsi = calculateRSI(data.prices);
    let vol = volumeSpike(data.volume);

    let signal = "HOLD";

    if (ema9 > ema21 && rsi < 60 && vol) signal = "BUY";
    else if (ema9 < ema21 && rsi > 40 && vol) signal = "SELL";

    return {
        symbol: data.symbol,
        price: data.prices[data.prices.length-1],
        ema9,
        ema21,
        rsi,
        vol,
        signal
    };
}

// ===== UI Update =====
function updateUI(res) {
    document.getElementById("symbol").innerText = res.symbol;
    document.getElementById("price").innerText = res.price.toFixed(2);
    document.getElementById("ema9").innerText = res.ema9.toFixed(2);
    document.getElementById("ema21").innerText = res.ema21.toFixed(2);
    document.getElementById("rsi").innerText = res.rsi.toFixed(2);
    document.getElementById("volume").innerText = res.vol ? "YES" : "NO";

    let signalEl = document.getElementById("signal");
    signalEl.innerText = "Signal: " + res.signal;

    signalEl.className = res.signal.toLowerCase();
}

// ===== MAIN =====
function runBot() {
    let data = getMockData(); // replace with real API later
    let result = generateSignal(data);
    updateUI(result);
}

// run every 5 sec
setInterval(runBot, 5000);
runBot();

</script>

</body>
</html>
